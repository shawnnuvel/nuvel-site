<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuvel Pte Ltd – Data Intelligence</title>
  <style>
    :root {
      --primary: #1c7ed6;
      --dark: #0b1e33;
      --light: #eef4ff;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      background: var(--light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: var(--dark);
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    header h1 {
      font-size: 1.5rem;
      margin: 0;
    }
    header nav a {
      color: #fff;
      margin-left: 1.5rem;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .hero {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4rem 1rem;
      background: linear-gradient(160deg,var(--primary),#5dade2);
      color: #fff;
    }
    .hero h2 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .hero p {
      max-width: 600px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    .cta-btn {
      background: #fff;
      color: var(--primary);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .cta-btn:hover {
      background: #f0f8ff;
    }
    footer {
      background: #fff;
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #666;
      box-shadow: 0 -1px 4px rgba(0,0,0,0.05);
    }
    @media (min-width: 640px) {
      .hero h2 { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nuvel</h1>
    <nav>
      <a href="#about">About</a>
      <a href="mailto:hello@nuvel.ai">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Data that Powers Talent Intelligence</h2>
      <p>Nuvel delivers a continuously‑refreshed global dataset of 470&nbsp;million professional profiles—ready for recruiting platforms, workforce analytics and AI‑driven talent solutions.</p>
      <button class="cta-btn" onclick="location.href='mailto:hello@nuvel.ai'">Request a Demo</button>
    </div>
  </section>

  <footer>
    © 2025 Nuvel Pte Ltd — Singapore UEN&nbsp;XXXXXXXXX
  </footer>
</body>
</html>
